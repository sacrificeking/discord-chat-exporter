name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Publish
        run: dotnet publish DiscordChatExporter.Gui/DiscordChatExporter.Gui.csproj -c Release -o publish_output /p:ContinuousIntegrationBuild=true

      - name: Zip Release
        run: Compress-Archive -Path publish_output/* -DestinationPath DiscordChatExporter.zip

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: DiscordChatExporter.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
